<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Atlas Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <h1>Event Atlas Münster</h1>
      </header>


      <section class="panel filters">
        <h2>Filter</h2>
        <div class="grid three">
          <label>
            <span>Von</span>
            <input id="startDateFilter" type="date" />
          </label>
          <label>
            <span>Bis</span>
            <input id="endDateFilter" type="date" />
          </label>
          <label>
            <span>Stadt</span>
            <input id="cityFilter" placeholder="z. B. Muenster" />
          </label>
        </div>
        <div class="grid two">
          <label>
            <span>Kategorie</span>
            <select id="categoryFilter">
              <option value="">Alle</option>
            </select>
          </label>
          <label class="checkbox-row">
            <input id="nextOnlyFilter" type="checkbox" />
            <span>Nur naechsten Termin je Event</span>
          </label>
        </div>
        <div class="actions">
          <button id="loadBtn" class="btn">Feed laden</button>
          <p id="resultInfo" class="muted"></p>
        </div>
      </section>

      <section class="panel">
        <div id="cards" class="cards"></div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-image-slot"></div>
        <div class="card-top">
          <p class="date"></p>
          <p class="price"></p>
        </div>
        <h3 class="title"></h3>
        <p class="meta-venue"></p>
        <p class="meta-organizer"></p>
        <p class="desc"></p>
        <div class="chips"></div>
        <div class="links"></div>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
