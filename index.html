<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Atlas Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="badge">Event Atlas</p>
        <h1>Datenmodell Visual Check</h1>
        <p class="subtitle">Live-Feed aus <code>public.upcoming_event_cards</code> mit Filtern auf Stadt, Kategorie und Zeitraum.</p>
      </header>

      <section class="panel credentials">
        <h2>Verbindung</h2>
        <div class="grid two">
          <label>
            <span>Supabase URL</span>
            <input id="supabaseUrl" placeholder="https://YOUR-PROJECT.supabase.co" />
          </label>
          <label>
            <span>Publishable Key</span>
            <input id="supabaseKey" placeholder="sb_publishable_..." />
          </label>
        </div>
        <button id="saveConfigBtn" class="btn">Speichern</button>
        <p id="configStatus" class="muted"></p>
      </section>

      <section class="panel filters">
        <h2>Filter</h2>
        <div class="grid three">
          <label>
            <span>Stadt</span>
            <input id="cityFilter" placeholder="z. B. Muenster" />
          </label>
          <label>
            <span>Kategorie</span>
            <select id="categoryFilter">
              <option value="">Alle</option>
            </select>
          </label>
          <label>
            <span>Zeitraum (Tage)</span>
            <input id="daysFilter" type="number" min="1" max="90" value="14" />
          </label>
        </div>
        <label class="checkbox-row">
          <input id="nextOnlyFilter" type="checkbox" />
          <span>Nur naechsten Termin je Event anzeigen</span>
        </label>
        <div class="actions">
          <button id="loadBtn" class="btn">Feed laden</button>
          <p id="resultInfo" class="muted"></p>
        </div>
      </section>

      <section class="panel">
        <div id="cards" class="cards"></div>
      </section>
    </main>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-top">
          <p class="date"></p>
          <p class="price"></p>
        </div>
        <h3 class="title"></h3>
        <p class="meta"></p>
        <p class="desc"></p>
        <div class="chips"></div>
        <div class="links"></div>
      </article>
    </template>

    <script src="./app.js" type="module"></script>
  </body>
</html>
